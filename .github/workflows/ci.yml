name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
            build_type: Debug
            sanitizers: ON
            benchmarks: OFF
          - compiler: gcc
            cc: gcc
            cxx: g++
            build_type: Release
            sanitizers: OFF
            benchmarks: ON
          - compiler: clang
            cc: clang
            cxx: clang++
            build_type: Debug
            sanitizers: ON
            benchmarks: OFF
          - compiler: clang
            cc: clang
            cxx: clang++
            build_type: Release
            sanitizers: OFF
            benchmarks: ON
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build gcc g++ clang

      # Benchmarks build (compile-checked with -Werror) only on the Release
      # legs, matching where they're meant to run -- ASan/UBSan overhead
      # would make their own numbers meaningless, so there's no point
      # compiling them under Debug+sanitizers here. CI never *runs* them (a
      # shared, possibly-throttled runner would produce noisy,
      # non-representative numbers, as BENCHMARKS.md's own measurement-
      # environment caveat already notes even for a dedicated dev machine);
      # this only catches build breakage, same bar as every other target --
      # the actual reported numbers in BENCHMARKS.md come from running them
      # directly, locally, before push.
      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DTB_ENABLE_ASAN=${{ matrix.sanitizers }} \
            -DTB_ENABLE_UBSAN=${{ matrix.sanitizers }} \
            -DTB_BUILD_BENCHMARKS=${{ matrix.benchmarks }} \
            -DTB_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build -j

      - name: Run demo executable
        run: ./build/tapebench_demo

      - name: Test
        run: ctest --test-dir build --output-on-failure

  tsan:
    name: clang / TSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build clang

      # TB_ENABLE_TSAN is mutually exclusive with ASan/UBSan (see CMakeLists.txt) --
      # a separate job, not another matrix leg of build-and-test. One compiler
      # (clang) is enough: races TSan catches are essentially never
      # compiler-specific, so gcc+clang here would double CI time for
      # negligible extra coverage. Runs the full suite, matching how
      # Debug/Release already run everything rather than cherry-picking just
      # the concurrent tests.
      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DTB_ENABLE_TSAN=ON \
            -DTB_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure
