name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
            build_type: Debug
            sanitizers: ON
          - compiler: gcc
            cc: gcc
            cxx: g++
            build_type: Release
            sanitizers: OFF
          - compiler: clang
            cc: clang
            cxx: clang++
            build_type: Debug
            sanitizers: ON
          - compiler: clang
            cc: clang
            cxx: clang++
            build_type: Release
            sanitizers: OFF
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build gcc g++ clang

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DTB_ENABLE_ASAN=${{ matrix.sanitizers }} \
            -DTB_ENABLE_UBSAN=${{ matrix.sanitizers }} \
            -DTB_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build -j

      - name: Run demo executable
        run: ./build/tapebench_demo

      - name: Test
        run: ctest --test-dir build --output-on-failure
